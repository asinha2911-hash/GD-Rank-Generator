<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GD Rank Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <aside class="controls">
      <p class="eyebrow">BLOODSTONE GRAPHICS ENGINE</p>
      <h1>Rank Generator</h1>
      <p class="intro">Create cosmic, Geometry Dash-inspired rank banners.</p>

      <label>
        Rank name
        <input id="rankName" value="AMETHYST" maxlength="18" />
      </label>

      <label>
        Extra text
        <input id="extraText" value="Tier XX-Peak" maxlength="40" />
      </label>

      <label>
        Crystal color
        <input id="mainColor" type="color" value="#a55cff" />
      </label>

      <label>
        Highlight color
        <input id="glowColor" type="color" value="#f1ccff" />
      </label>

      <label>
        Particle density
        <input id="particleAmount" type="range" min="25" max="220" value="120" />
      </label>

      <div class="button-row">
        <button id="generateButton">Regenerate</button>
        <button id="downloadButton" class="secondary">Download PNG</button>
      </div>
    </aside>

    <section class="preview">
      <canvas id="rankCanvas" width="1600" height="600"></canvas>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
